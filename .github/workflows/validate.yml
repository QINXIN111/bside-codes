name: Validate recovery data

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:seed
      - name: Reject stale or hand-edited seed migrations
        run: git diff --exit-code -- migrations/0002_seed.sql
      - run: npm test
