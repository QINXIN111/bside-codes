name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:seed
      - run: git diff --exit-code -- migrations/0002_seed.sql
      - run: npm test
      - name: Deploy the reviewed commit to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name bside-sharecode --branch main --commit-hash "${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
